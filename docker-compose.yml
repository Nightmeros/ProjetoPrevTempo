version: "3.9"

services:

  backend:
    image: python:3.11-slim
    container_name: clima-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sleep infinity

  frontend:
    image: node:20
    container_name: clima-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sleep infinity